services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_capabilities
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://crawler:crawler@postgres:5432/ai_capabilities
    ports:
      - "8099:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
