services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_capabilities
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d ai_capabilities"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      CRAWL_DATABASE_URL: postgresql://crawler:crawler@postgres:5432/ai_capabilities
      CRAWL_CONCURRENCY: 2
      CRAWL_WORKERS: 300
      CRAWL_DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web
      - default

volumes:
  postgres_data:

networks:
  web:
    external: true
